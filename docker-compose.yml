version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ttms-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: ttms-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/Team_Tasks}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:8080
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    container_name: ttms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo-data:
